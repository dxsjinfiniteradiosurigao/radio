
<style>
*{margin:0;padding:0;box-sizing:border-box;}
.phone{width:300px;margin:1rem auto;background:#050816;border-radius:36px;padding:8px;box-shadow:0 12px 40px rgba(0,0,0,0.35);}
.screen{background:linear-gradient(160deg,#070b1a 0%,#0d1530 45%,#1a0d20 100%);border-radius:30px;overflow:hidden;min-height:600px;position:relative;padding:18px 18px 20px;}
.blob{position:absolute;border-radius:50%;filter:blur(50px);opacity:0.55;pointer-events:none;}
.blob1{width:160px;height:160px;background:#1a3a8f;top:-40px;left:-40px;}
.blob2{width:140px;height:140px;background:#dc1e3c;top:120px;right:-50px;}
.content{position:relative;z-index:1;}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.live-pill{display:flex;align-items:center;gap:6px;background:rgba(220,30,60,0.15);border:1px solid rgba(220,30,60,0.3);color:#ff7286;font-size:10px;font-weight:700;letter-spacing:1.2px;padding:5px 11px;border-radius:20px;}
.pulse-dot{width:6px;height:6px;border-radius:50%;background:#ff3355;position:relative;}
.pulse-dot::after{content:'';position:absolute;inset:-3px;border-radius:50%;border:1px solid #ff3355;animation:pulseRing 1.6s ease-out infinite;}
@keyframes pulseRing{0%{transform:scale(0.6);opacity:0.8;}100%{transform:scale(2.2);opacity:0;}}
.icon-btn{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,0.08);border:none;color:#fff;display:flex;align-items:center;justify-content:center;font-size:15px;cursor:pointer;}
.hero{display:flex;flex-direction:column;align-items:center;margin:6px 0 18px;}
.time{font-size:13px;color:#9aa4d8;margin-bottom:6px;}
.logo-wrap{position:relative;width:148px;height:148px;display:flex;align-items:center;justify-content:center;margin-bottom:16px;}
.ring{position:absolute;border-radius:50%;border:1.5px solid rgba(255,255,255,0.18);}
.ring1{width:148px;height:148px;animation:ringPulse 3.5s linear infinite;}
.ring2{width:148px;height:148px;animation:ringPulse 3.5s linear infinite 1.2s;}
@keyframes ringPulse{0%{transform:scale(0.82);opacity:0;}40%{opacity:0.8;}100%{transform:scale(1.18);opacity:0;}}
.logo{width:108px;height:108px;border-radius:50%;background:linear-gradient(145deg,rgba(255,255,255,0.14),rgba(255,255,255,0.04));border:1px solid rgba(255,255,255,0.18);display:flex;align-items:center;justify-content:center;font-size:42px;color:#fff;position:relative;z-index:1;}
.station-name{color:#fff;font-size:19px;font-weight:800;text-align:center;}
.station-sub{color:#9aa4d8;font-size:12px;margin-top:2px;}
.glass-card{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:18px;padding:14px 16px;margin-bottom:12px;backdrop-filter:blur(6px);}
.card-label{font-size:10px;font-weight:800;letter-spacing:1.5px;color:#ff7286;margin-bottom:6px;}
.program-title{color:#fff;font-size:16px;font-weight:700;margin-bottom:4px;}
.program-status{color:#ff8094;font-size:12px;}
.eq-row{display:flex;align-items:flex-end;gap:3px;height:20px;margin-top:10px;}
.eq-row span{width:3px;border-radius:2px;background:linear-gradient(180deg,#ff5671,#dc1e3c);animation:eqAnim 0.7s ease-in-out infinite alternate;}
.eq-row span:nth-child(1){height:40%;animation-delay:0s;}
.eq-row span:nth-child(2){height:90%;animation-delay:0.15s;}
.eq-row span:nth-child(3){height:60%;animation-delay:0.3s;}
.eq-row span:nth-child(4){height:100%;animation-delay:0.1s;}
.eq-row span:nth-child(5){height:50%;animation-delay:0.22s;}
.eq-row span:nth-child(6){height:75%;animation-delay:0.05s;}
.eq-row span:nth-child(7){height:35%;animation-delay:0.28s;}
@keyframes eqAnim{from{transform:scaleY(0.3);}to{transform:scaleY(1);}}
.play-fab-wrap{position:relative;width:84px;height:84px;margin:8px auto 0;}
.fab-ripple{position:absolute;inset:-6px;border-radius:50%;border:2px solid #dc1e3c;opacity:0;pointer-events:none;}
.fab-ripple.go{animation:fabRipple 0.6s ease-out forwards;}
@keyframes fabRipple{0%{transform:scale(0.8);opacity:0.8;}100%{transform:scale(1.5);opacity:0;}}
.play-fab{width:84px;height:84px;border-radius:50%;background:linear-gradient(150deg,#ff5671,#dc1e3c);border:none;color:#fff;font-size:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;z-index:1;box-shadow:0 8px 28px rgba(220,30,60,0.45);transition:transform 0.15s;}
.play-fab:hover{transform:scale(1.06);}
.play-fab:active{transform:scale(0.92);}
.play-fab.playing{animation:fabBeat 1.8s ease-in-out infinite;}
@keyframes fabBeat{0%,100%{box-shadow:0 8px 28px rgba(220,30,60,0.45);}50%{box-shadow:0 8px 38px rgba(220,30,60,0.65);}}
@keyframes spin{to{transform:rotate(360deg);}}
.spin-icon{display:inline-block;animation:spin 0.8s linear infinite;}
.nav{display:flex;justify-content:space-around;margin-top:18px;padding-top:14px;border-top:1px solid rgba(255,255,255,0.08);}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:4px;color:#5d6699;font-size:10px;font-weight:700;background:none;border:none;cursor:pointer;transition:color 0.2s,transform 0.2s;}
.nav-btn i{font-size:21px;}
.nav-btn.active{color:#fff;transform:translateY(-2px);}
.nav-btn.active i{filter:drop-shadow(0 0 6px rgba(255,255,255,0.4));}
</style>

<h2 class="sr-only">DXSJ Infinite Radio improved dark glassmorphism interface preview with animated play button, equalizer and pulse rings</h2>

<div class="phone">
  <div class="screen">
    <div class="blob blob1"></div>
    <div class="blob blob2"></div>

    <div class="content">
      <div class="topbar">
        <div class="live-pill"><div class="pulse-dot"></div>LIVE</div>
        <button class="icon-btn" aria-label="Share"><i class="ti ti-share"></i></button>
      </div>

      <div class="hero">
        <div class="time">10:42 AM &bull; Thursday</div>
        <div class="logo-wrap">
          <div class="ring ring1"></div>
          <div class="ring ring2"></div>
          <div class="logo"><i class="ti ti-broadcast" aria-hidden="true"></i></div>
        </div>
        <div class="station-name">93.3 Infinite Radio</div>
        <div class="station-sub">Surigao City</div>
      </div>

      <div class="glass-card">
        <div class="card-label">NOW PLAYING</div>
        <div class="program-title">Afternoon Delight</div>
        <div class="program-status">with DJ Vee &bull; on air now</div>
        <div class="eq-row" id="eqRow">
          <span></span><span></span><span></span><span></span><span></span><span></span><span></span>
        </div>
      </div>

      <div class="play-fab-wrap">
        <div class="fab-ripple" id="fabRipple"></div>
        <button class="play-fab playing" id="fabBtn" aria-label="Play or pause stream">
          <i class="ti ti-player-pause-filled" id="fabIcon"></i>
        </button>
      </div>

      <div class="nav">
        <button class="nav-btn active" aria-label="Home"><i class="ti ti-home"></i>Home</button>
        <button class="nav-btn" aria-label="Live"><i class="ti ti-broadcast"></i>Live</button>
        <button class="nav-btn" aria-label="Schedule"><i class="ti ti-calendar-event"></i>Schedule</button>
        <button class="nav-btn" aria-label="About"><i class="ti ti-info-circle"></i>About</button>
      </div>
    </div>
  </div>
</div>

<script>
var playing = true;
var fabBtn = document.getElementById('fabBtn');
var fabIcon = document.getElementById('fabIcon');
var fabRipple = document.getElementById('fabRipple');
var eqRow = document.getElementById('eqRow');

fabBtn.addEventListener('click', function(){
  fabRipple.classList.remove('go');
  void fabRipple.offsetWidth;
  fabRipple.classList.add('go');

  playing = !playing;
  if(playing){
    fabBtn.classList.add('playing');
    fabIcon.className = 'ti ti-player-pause-filled';
    eqRow.style.opacity = '1';
  } else {
    fabBtn.classList.remove('playing');
    fabIcon.className = 'ti ti-player-play-filled';
    eqRow.style.opacity = '0.25';
  }
});
</script>
