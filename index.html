<div class="glass stats">

    <div id="currentProgram"
        style="
        font-size:28px;
        font-weight:800;
        color:#ffffff;
        margin-bottom:10px;
        ">
        Loading...
    </div>

    <div id="programStatus"
        style="
        color:#dc1e3c;
        font-weight:700;
        margin-bottom:8px;
        ">
        Checking Schedule...
    </div>

    <div id="nextProgram"
        style="
        color:rgba(255,255,255,.75);
        font-size:14px;
        ">
    </div>

</div>

<script>

function updateProgramSchedule() {

    const now = new Date();

    const day = now.getDay();
    const currentTime =
        now.getHours() * 60 +
        now.getMinutes();

    let programs = [];

    // MONDAY - SATURDAY
    if(day >= 1 && day <= 6){
        programs.push({
            title:"RATSADA BALITA",
            start:360,
            end:480
        });
    }

    // TUESDAY
    if(day === 2){
        programs.push({
            title:"AN SANGGUNIAN",
            start:480,
            end:520
        });
    }

    // MONDAY - FRIDAY
    if(day >= 1 && day <= 5){

        programs.push({
            title:"SABI MO, SABI KO",
            start:540,
            end:660
        });

        programs.push({
            title:"ISUMBONG SA BARANGAY",
            start:720,
            end:780
        });

        programs.push({
            title:"AFTERNOON DELIGHT",
            start:900,
            end:1020
        });

        programs.push({
            title:"INFINITE ROCK",
            start:1050,
            end:1140
        });
    }

    // SATURDAY
    if(day === 6){
        programs.push({
            title:"WEEKEND COUNTDOWN & REQUEST SHOW",
            start:600,
            end:720
        });
    }

    programs.sort((a,b)=>a.start-b.start);

    let currentProgram = null;
    let nextProgram = null;

    for(let i=0;i<programs.length;i++){

        if(
            currentTime >= programs[i].start &&
            currentTime < programs[i].end
        ){

            currentProgram = programs[i];

            if(i < programs.length-1){
                nextProgram = programs[i+1];
            }

            break;
        }

        if(
            currentTime < programs[i].start &&
            !nextProgram
        ){
            nextProgram = programs[i];
        }
    }

    const currentEl =
        document.getElementById("currentProgram");

    const statusEl =
        document.getElementById("programStatus");

    const nextEl =
        document.getElementById("nextProgram");

    if(currentProgram){

        currentEl.innerHTML =
            "🎙️ " + currentProgram.title;

        statusEl.innerHTML =
            "NOW ON AIR";

    }else{

        currentEl.innerHTML =
            "📻 DXSJ Infinite Radio";

        statusEl.innerHTML =
            "Music Programming";

    }

    if(nextProgram){

        nextEl.innerHTML =
            "Next: " +
            nextProgram.title;

    }else{

        nextEl.innerHTML =
            "Stay tuned for upcoming programs";

    }

}

updateProgramSchedule();

setInterval(
    updateProgramSchedule,
    60000
);

</script>
