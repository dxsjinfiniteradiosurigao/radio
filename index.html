<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#1a1a2e; display:flex; 
         justify-content:center; align-items:center; 
         height:100vh; overflow:hidden; }
  .container { text-align:center; padding:20px; }
  .radio-icon { font-size:60px; margin-bottom:20px; }
  .station-name { color:white; font-family:sans-serif; 
                  font-size:18px; font-weight:bold; 
                  margin-bottom:6px; letter-spacing:1px; }
  .station-sub { color:#aaa; font-family:sans-serif; 
                 font-size:13px; margin-bottom:30px; }
  #btn { background:#e94560; color:white; border:none; 
         padding:18px 45px; font-size:20px; border-radius:50px; 
         cursor:pointer; transition:all 0.3s; }
  #btn:active { transform:scale(0.95); }
  #status { color:#aaa; font-family:sans-serif; 
            font-size:14px; margin-top:20px; }
  .dot { display:inline-block; width:8px; height:8px; 
         background:#e94560; border-radius:50%; 
         margin-right:6px; animation:pulse 1.2s infinite; }
  @keyframes pulse { 
    0%,100%{ opacity:1; } 
    50%{ opacity:0.2; } 
  }
  iframe { 
    position:fixed; top:-9999px; left:-9999px;
    width:1px; height:1px; border:none; 
  }
</style>
</head>
