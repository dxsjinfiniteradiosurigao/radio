<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>93.3 Infinite Radio Surigao</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f0f4ff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  .app {
    width: 100%;
    max-width: 420px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    background: #f0f4ff;
    position: relative;
  }

  /* Top blue band */
  .top-band {
    width: 100%;
    background: #1a3a8f;
    padding: 52px 22px 36px;
    display: flex;
    flex-direction: column;
    align-items: center;
    border-radius: 0 0 32px 32px;
  }

  .top-row {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
  }

  .top-title {
    color: #fff;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.4px;
  }

  .icon-btn {
    background: rgba(255,255,255,0.15);
    border: none;
    color: #fff;
    width: 38px;
    height: 38px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 18px;
    transition: background 0.2s, transform 0.15s;
  }

  .icon-btn:hover { background: rgba(255,255,255,0.28); }
  .icon-btn:active { transform: scale(0.92); }

  /* Album art */
  .album-wrap {
    position: relative;
    width: 160px;
    height: 160px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .pr {
    position: absolute;
    width: 160px;
    height: 160px;
    border-radius: 50%;
    border: 2px solid rgba(220,30,60,0.5);
    animation: pa 2s ease-out infinite;
    opacity: 0;
  }
  .pr.p2 { animation-delay: 0.75s; }
  .pr.p3 { animation-delay: 1.5s; }
  .pr.off { animation-play-state: paused; opacity: 0 !important; }

  @keyframes pa {
    0% { transform: scale(1); opacity: 0.65; }
    100% { transform: scale(1.65); opacity: 0; }
  }

  .album {
    width: 160px;
    height: 160px;
    border-radius: 50%;
    background: #fff;
    border: 4px solid #dc1e3c;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 1;
  }

  .album-inner {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: #f0f4ff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 30px;
    color: #1a3a8f;
  }

  /* Body */
  .body {
    width: 100%;
    padding: 0 18px 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-top: -20px;
  }

  /* Info card */
  .card {
    width: 100%;
    background: #fff;
    border-radius: 24px;
    padding: 20px 20px 16px;
    border: 0.5px solid rgba(26,58,143,0.1);
    margin-bottom: 14px;
    box-shadow: 0 2px 16px rgba(26,58,143,0.07);
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 5px 14px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.4px;
    margin-bottom: 10px;
    transition: all 0.3s;
  }

  .badge.live { background: rgba(220,30,60,0.1); color: #dc1e3c; border: 1px solid rgba(220,30,60,0.25); }
  .badge.off { background: rgba(26,58,143,0.07); color: #1a3a8f; border: 1px solid rgba(26,58,143,0.15); }

  .live-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #dc1e3c;
    animation: blink 1.2s ease-in-out infinite;
  }
  .live-dot.off { animation-play-state: paused; background: #8a9bcc; }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.15} }

  .station-name {
    color: #1a3a8f;
    font-size: 20px;
    font-weight: 700;
    text-align: center;
    margin-bottom: 4px;
  }

  .station-sub {
    color: #8a9bcc;
    font-size: 13px;
    text-align: center;
  }

  .ticker-wrap {
    width: 100%;
    overflow: hidden;
    border-top: 0.5px solid rgba(26,58,143,0.08);
    border-bottom: 0.5px solid rgba(26,58,143,0.08);
    padding: 8px 0;
    margin-top: 14px;
  }

  .ticker {
    display: inline-block;
    white-space: nowrap;
    font-size: 12px;
    color: #dc1e3c;
    font-weight: 600;
    animation: tick 18s linear infinite;
  }
  .ticker.off { animation-play-state: paused; color: #c0c8e0; }

  @keyframes tick {
    0% { transform: translateX(100vw); }
    100% { transform: translateX(-100%); }
  }

  /* Controls card */
  .ctrl-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 24px;
    margin-bottom: 22px;
    width: 100%;
  }

  /* Side buttons */
  .side-btn {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    background: #f0f4ff;
    border: 0.5px solid rgba(26,58,143,0.12);
    color: #8a9bcc;
    font-size: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.2s, color 0.2s, transform 0.18s, border-color 0.2s;
    position: relative;
    overflow: hidden;
  }

  .side-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: rgba(26,58,143,0.1);
    transform: scale(0);
    transition: transform 0.35s ease-out;
  }

  .side-btn:active::before { transform: scale(2); }
  .side-btn:hover { background: #dce5ff; color: #1a3a8f; transform: scale(1.08); }
  .side-btn:active { transform: scale(0.93); }
  .side-btn.liked { color: #dc1e3c; background: rgba(220,30,60,0.08); border-color: rgba(220,30,60,0.2); }

  /* Play button */
  .play-wrap {
    position: relative;
    width: 76px;
    height: 76px;
  }

  .ripple-ring {
    position: absolute;
    inset: -6px;
    border-radius: 50%;
    border: 2.5px solid #dc1e3c;
    transform: scale(0.85);
    opacity: 0;
    pointer-events: none;
  }

  .ripple-ring.go {
    animation: ripple-out 0.55s ease-out forwards;
  }

  @keyframes ripple-out {
    0% { transform: scale(0.85); opacity: 0.75; }
    100% { transform: scale(1.6); opacity: 0; }
  }

  .play-btn {
    width: 76px;
    height: 76px;
    border-radius: 50%;
    background: #dc1e3c;
    border: none;
    color: #fff;
    font-size: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    position: relative;
    z-index: 1;
    transition: transform 0.15s, background 0.25s;
    box-shadow: 0 6px 22px rgba(220,30,60,0.38);
  }

  .play-btn:hover { transform: scale(1.07); }
  .play-btn:active { transform: scale(0.93); }
  .play-btn.off-state { background: #1a3a8f; box-shadow: 0 6px 22px rgba(26,58,143,0.3); }
  .play-btn.loading { background: #8a9bcc; box-shadow: 0 6px 22px rgba(138,155,204,0.3); }

  @keyframes spin { to { transform: rotate(360deg); } }
  .spinning { display: inline-block; animation: spin 0.85s linear infinite; }

  /* Volume */
  .vol-section { width: 100%; }

  .vol-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }

  .vol-top span { color: #8a9bcc; font-size: 12px; }
  .vol-pct { color: #1a3a8f !important; font-weight: 700 !important; }

  .vol-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .vol-row i { color: #c0c8e0; font-size: 18px; }

  input[type=range] {
    flex: 1;
    -webkit-appearance: none;
    appearance: none;
    height: 5px;
    border-radius: 5px;
    background: #dce5ff;
    outline: none;
    cursor: pointer;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: #dc1e3c;
    cursor: pointer;
    border: 3px solid #fff;
    box-shadow: 0 2px 8px rgba(220,30,60,0.3);
    transition: transform 0.15s;
  }

  input[type=range]::-webkit-slider-thumb:active { transform: scale(1.25); }

  /* Bottom nav */
  .bottom-nav {
    width: 100%;
    background: #fff;
    display: flex;
    justify-content: space-around;
    border-top: 0.5px solid rgba(26,58,143,0.1);
    padding: 14px 0 20px;
    margin-top: auto;
    border-radius: 24px 24px 0 0;
    box-shadow: 0 -2px 16px rgba(26,58,143,0.06);
  }

  .nav-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    color: #c0c8e0;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.3px;
    cursor: pointer;
    background: none;
    border: none;
    padding: 4px 18px;
    transition: color 0.2s, transform 0.15s;
  }

  .nav-btn i { font-size: 22px; }
  .nav-btn.active { color: #dc1e3c; }
  .nav-btn:not(.active):hover { color: #1a3a8f; transform: translateY(-2px); }
  .nav-btn:active { transform: scale(0.9); }
</style>
</head>
<body>

<div class="app">

  <!-- Top blue band -->
  <div class="top-band">
    <div class="top-row">
      <button class="icon-btn" aria-label="Menu"><i class="ti ti-menu-2"></i></button>
      <span class="top-title">DXSJ Infinite Radio</span>
      <button class="icon-btn" id="shareBtn" aria-label="Share"><i class="ti ti-share"></i></button>
    </div>

    <div class="album-wrap">
      <div class="pr p1 off" id="r1"></div>
      <div class="pr p2 off" id="r2"></div>
      <div class="pr p3 off" id="r3"></div>
      <div class="album">
        <div class="album-inner">
          <i class="ti ti-radio" aria-hidden="true"></i>
        </div>
      </div>
    </div>
  </div>

  <!-- Body -->
  <div class="body">

    <!-- Info card -->
    <div class="card">
      <div class="badge off" id="badge">
        <div class="live-dot off" id="dot"></div>
        <span id="btext">OFF AIR</span>
      </div>
      <div class="station-name">DXSJ Infinite Radio</div>
      <div class="station-sub">Surigao City</div>
      <div class="ticker-wrap">
        <span class="ticker off" id="ticker">
          Now playing live &nbsp;•&nbsp; DXSJ Infinite Radio Surigao City &nbsp;•&nbsp; Stay tuned! &nbsp;&nbsp;&nbsp;&nbsp; Now playing live &nbsp;•&nbsp; DXSJ Infinite Radio Surigao City &nbsp;•&nbsp; Stay tuned!
        </span>
      </div>
    </div>

    <!-- Controls card -->
    <div class="card">
      <div class="ctrl-row">

        <button class="side-btn" id="heartBtn" aria-label="Favourite">
          <i class="ti ti-heart" id="heartIcon"></i>
        </button>

        <div class="play-wrap">
          <div class="ripple-ring" id="ripple"></div>
          <button class="play-btn off-state" id="playBtn" aria-label="Play or stop stream">
            <i class="ti ti-player-play" id="playIcon"></i>
          </button>
        </div>

        <button class="side-btn" id="sleepBtn" aria-label="Sleep timer">
          <i class="ti ti-moon"></i>
        </button>

      </div>

      <!-- Volume -->
      <div class="vol-section">
        <div class="vol-top">
          <span>Volume</span>
          <span class="vol-pct" id="volPct">80%</span>
        </div>
        <div class="vol-row">
          <i class="ti ti-volume-3" aria-hidden="true"></i>
          <input type="range" id="volSlider" min="0" max="100" value="80" step="1" aria-label="Volume control">
          <i class="ti ti-volume" aria-hidden="true"></i>
        </div>
      </div>
    </div>

  </div>

  <!-- Bottom nav -->
  <div class="bottom-nav">
    <button class="nav-btn active" id="nav-live" aria-label="Live">
      <i class="ti ti-radio"></i>Live
    </button>
    <button class="nav-btn" id="nav-sched" aria-label="Schedule">
      <i class="ti ti-calendar"></i>Schedule
    </button>
    <button class="nav-btn" id="nav-about" aria-label="About">
      <i class="ti ti-info-circle"></i>About
    </button>
  </div>

</div>

<!-- Hidden stream iframe -->
<iframe id="vdo" allow="autoplay; microphone; camera; speaker"
  style="position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;border:none;"></iframe>

<script>
var STREAM = 'https://vdo.ninja/?view=fJbgPNk&autoplay=1&novideo=1&muted=0&nopreview=1&cleanoutput=1';
var playing = false;
var liked = false;

var playBtn  = document.getElementById('playBtn');
var playIcon = document.getElementById('playIcon');
var badge    = document.getElementById('badge');
var dot      = document.getElementById('dot');
var btext    = document.getElementById('btext');
var ticker   = document.getElementById('ticker');
var ripple   = document.getElementById('ripple');
var r1       = document.getElementById('r1');
var r2       = document.getElementById('r2');
var r3       = document.getElementById('r3');
var vdo      = document.getElementById('vdo');
var volSlider= document.getElementById('volSlider');
var volPct   = document.getElementById('volPct');
var heartBtn = document.getElementById('heartBtn');
var heartIcon= document.getElementById('heartIcon');

function fireRipple() {
  ripple.classList.remove('go');
  void ripple.offsetWidth;
  ripple.classList.add('go');
}

function setLive() {
  playing = true;
  playBtn.classList.remove('loading', 'off-state');
  playIcon.className = 'ti ti-player-stop';
  badge.className = 'badge live';
  dot.className = 'live-dot';
  btext.textContent = 'LIVE';
  ticker.className = 'ticker';
  r1.classList.remove('off');
  r2.classList.remove('off');
  r3.classList.remove('off');
}

function setOff() {
  playing = false;
  playBtn.classList.add('off-state');
  playBtn.classList.remove('loading');
  playIcon.className = 'ti ti-player-play';
  badge.className = 'badge off';
  dot.className = 'live-dot off';
  btext.textContent = 'OFF AIR';
  ticker.className = 'ticker off';
  r1.classList.add('off');
  r2.classList.add('off');
  r3.classList.add('off');
}

function setConnecting() {
  playBtn.classList.remove('off-state');
  playBtn.classList.add('loading');
  playIcon.innerHTML = '<span class="spinning"><i class="ti ti-loader-2" style="font-size:26px;"></i></span>';
  badge.className = 'badge live';
  dot.className = 'live-dot off';
  btext.textContent = 'CONNECTING';
}

playBtn.addEventListener('click', function() {
  fireRipple();
  if (!playing) {
    setConnecting();
    vdo.src = STREAM;
    setTimeout(setLive, 4000);
  } else {
    vdo.src = '';
    setOff();
  }
});

heartBtn.addEventListener('click', function() {
  liked = !liked;
  heartBtn.classList.toggle('liked', liked);
  heartIcon.className = liked ? 'ti ti-heart-filled' : 'ti ti-heart';
  heartBtn.style.transform = 'scale(1.3)';
  setTimeout(function(){ heartBtn.style.transform = ''; }, 200);
});

document.getElementById('sleepBtn').addEventListener('click', function() {
  this.style.color = '#1a3a8f';
  this.style.background = '#dce5ff';
  setTimeout(function(){
    document.getElementById('sleepBtn').style.color = '';
    document.getElementById('sleepBtn').style.background = '';
  }, 300);
});

volSlider.addEventListener('input', function() {
  volPct.textContent = Math.round(this.value) + '%';
  try { vdo.contentWindow.postMessage({ volume: this.value / 100 }, '*'); } catch(e) {}
});

document.getElementById('shareBtn').addEventListener('click', function() {
  if (navigator.share) {
    navigator.share({ title: 'DXSJ Infinite Radio', text: 'Listen to DXSJ Infinite Radio Surigao City!', url: window.location.href });
  }
});

var navBtns = document.querySelectorAll('.nav-btn');
navBtns.forEach(function(btn) {
  btn.addEventListener('click', function() {
    navBtns.forEach(function(b){ b.classList.remove('active'); });
    btn.classList.add('active');
  });
});
</script>

</body>
</html>
