<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DXSJ Infinite Radio PRO v3</title>

<link rel="manifest" href="data:application/manifest+json,{
  \"name\":\"DXSJ Infinite Radio\",
  \"short_name\":\"Infinite Radio\",
  \"start_url\":\".\",
  \"display\":\"standalone\",
  \"background_color\":\"#05070d\",
  \"theme_color\":\"#dc1e3c\",
  \"icons\":[{\"src\":\"https://upload.wikimedia.org/wikipedia/commons/8/8f/Flat_cross_icon.svg\",\"sizes\":\"512x512\",\"type\":\"image/png\"}]
}">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">

<style>
body{
margin:0;
background:#05070d;
color:#fff;
overflow:hidden;
font-family:system-ui;
}

.bg{
position:fixed;inset:0;
background:radial-gradient(circle at 30% 20%, #dc1e3c33, transparent 40%),
radial-gradient(circle at 70% 80%, #1a3a8f33, transparent 40%);
filter:blur(50px);
transform:scale(1.2);
}

.center{
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:15px;
position:relative;
z-index:2;
}

canvas{
width:320px;
height:120px;
border-radius:20px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(20px);
}

.play{
width:80px;height:80px;
border-radius:50%;
border:none;
background:#dc1e3c;
color:#fff;
font-size:28px;
}

.vinyl{
width:120px;height:120px;
border-radius:50%;
background:radial-gradient(circle,#222,#000);
border:6px solid #333;
animation:spin 6s linear infinite;
animation-play-state:paused;
}

@keyframes spin{to{transform:rotate(360deg)}}

/* MINI PLAYER */
.mini{
position:fixed;
left:10px;
right:10px;
bottom:80px;
height:70px;
background:rgba(20,20,30,0.7);
backdrop-filter:blur(20px);
border-radius:16px;
display:flex;
align-items:center;
justify-content:space-between;
padding:10px;
z-index:10;
touch-action:none;
}

.tabs{
position:fixed;
bottom:0;
left:0;
right:0;
height:70px;
display:flex;
justify-content:space-around;
align-items:center;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(20px);
}

.tab{color:#888;font-size:11px;text-align:center}
.tab.active{color:#dc1e3c}
</style>
</head>

<body>

<div class="bg"></div>

<div class="center">
  <div class="vinyl" id="vinyl"></div>

  <canvas id="vis"></canvas>

  <button class="play" id="play">▶</button>
</div>

<div class="mini" id="mini">
  <div>
    <b>Now Playing</b><br>
    <small>DXSJ Live Stream</small>
  </div>
  <button id="miniBtn">▶</button>
</div>

<div class="tabs">
  <div class="tab active">Home</div>
  <div class="tab">Schedule</div>
  <div class="tab">About</div>
</div>

<script>

/* ================= STREAM FALLBACK ================= */
const streams=[
"https://stream-02.surfernetwork.com/yy0d3w86zxhvv",
"https://stream-177.surfernetwork.com/yy0d3w86zxhvv"
];

let audio=new Audio();
audio.crossOrigin="anonymous";
audio.src=streams[0];

let index=0;
function nextStream(){
index++;
if(index>=streams.length) index=0;
audio.src=streams[index];
audio.play().catch(()=>setTimeout(nextStream,2000));
}

/* ================= AUDIO ENGINE ================= */
let ctx, analyser, dataArray;
let playing=false;

function initAudio(){
ctx=new AudioContext();
analyser=ctx.createAnalyser();
analyser.fftSize=512; // HIGH RESOLUTION
let src=ctx.createMediaElementSource(audio);
src.connect(analyser);
analyser.connect(ctx.destination);
dataArray=new Uint8Array(analyser.frequencyBinCount);
}

/* ================= VISUALIZER ================= */
const canvas=document.getElementById("vis");
const c=canvas.getContext("2d");
canvas.width=320;
canvas.height=120;

let bass=0;

function draw(){
requestAnimationFrame(draw);
if(!analyser) return;

analyser.getByteFrequencyData(dataArray);

c.clearRect(0,0,canvas.width,canvas.height);

let x=10;
bass=0;

for(let i=0;i<dataArray.length;i++){
let v=dataArray[i];
bass+=v;

let h=v/2;

c.fillStyle=`rgb(${200+v},40,80)`;
c.fillRect(x,canvas.height-h,4,h);

x+=6;
}

bass/=dataArray.length;

/* 🔥 reactive background */
document.querySelector(".bg").style.opacity=0.3 + bass/300;

/* 🔥 haptic beat */
if(bass>140 && navigator.vibrate){
navigator.vibrate(20);
}

/* 🔥 vinyl sync */
document.getElementById("vinyl").style.animationPlayState =
playing ? "running" : "paused";
}
draw();

/* ================= MEDIA SESSION ================= */
function setupMediaSession(){
if(!("mediaSession" in navigator)) return;

navigator.mediaSession.metadata=new MediaMetadata({
title:"DXSJ Infinite Radio",
artist:"Live Broadcast",
album:"Surigao",
artwork:[{src:"https://i.imgur.com/8Km9tLL.png",sizes:"512x512",type:"image/png"}]
});

navigator.mediaSession.setActionHandler("play",()=>audio.play());
navigator.mediaSession.setActionHandler("pause",()=>audio.pause());
}

/* ================= PLAY ================= */
document.getElementById("play").onclick=async()=>{
if(!ctx) initAudio();
await ctx.resume();

if(!playing){
audio.play().catch(nextStream);
playing=true;
setupMediaSession();
}else{
audio.pause();
playing=false;
}
};

/* ================= AUTO RECONNECT ================= */
audio.addEventListener("error",()=>{
nextStream();
});

/* ================= MINI PLAYER DRAG ================= */
const mini=document.getElementById("mini");
let startY=0;

mini.addEventListener("touchstart",e=>startY=e.touches[0].clientY);

mini.addEventListener("touchmove",e=>{
let diff=e.touches[0].clientY-startY;
if(diff>0) mini.style.transform=`translateY(${diff}px)`;
});

mini.addEventListener("touchend",()=>{
mini.style.transform="";
});

/* ================= PUSH NOTIF (DEMO LOCAL) ================= */
function notify(msg){
if(Notification.permission==="granted"){
new Notification(msg);
}
}

setTimeout(()=>{
if(Notification.permission!=="granted"){
Notification.requestPermission();
}
},3000);

setInterval(()=>{
let d=new Date();
if(d.getMinutes()%30===0){
notify("📻 Live program is on air at DXSJ!");
}
},60000);

</script>

</body>
</html>
