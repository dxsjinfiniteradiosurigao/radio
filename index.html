<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DXSJ Radio Bottom Sheet</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  height: 200vh;
  background: #0f1f4d;
}

/* FAKE CONTENT */
.content {
  padding: 20px;
  color: white;
}

/* BACKDROP */
.backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.3);
  opacity: 0;
  pointer-events: none;
  transition: 0.3s;
  z-index: 9998;
}

/* PLAYER SHEET */
.sheet {
  position: fixed;
  left: 0;
  right: 0;
  bottom: 0;
  height: 90px;
  background: #1a3a8f;
  border-radius: 20px 20px 0 0;
  transition: all 0.35s ease;
  z-index: 9999;
  color: white;
  overflow: hidden;
}

/* EXPANDED STATE */
.sheet.expanded {
  height: 100vh;
  border-radius: 0;
}

/* HEADER (DRAG HANDLE) */
.handle {
  width: 60px;
  height: 5px;
  background: rgba(255,255,255,0.4);
  border-radius: 10px;
  margin: 10px auto;
}

/* CONTENT */
.inner {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  gap: 12px;
}

/* MINI MODE HIDE */
.sheet:not(.expanded) .full {
  display: none;
}

/* MINI MODE */
.miniRow {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 14px;
  height: 90px;
}

.title {
  font-weight: bold;
}

button {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  border: none;
  background: #dc1e3c;
  color: white;
  font-size: 18px;
}

.fullTitle {
  font-size: 22px;
  font-weight: bold;
}

.status {
  opacity: 0.8;
  font-size: 14px;
}

</style>
</head>

<body>

<div class="content">
  <h2>DXSJ Infinite Radio</h2>
  <p>Drag player up or down</p>
</div>

<div class="backdrop" id="backdrop"></div>

<!-- SHEET -->
<div class="sheet" id="sheet">

  <!-- MINI -->
  <div class="miniRow">
    <div class="title">DXSJ Radio</div>
    <button id="playBtnMini">▶</button>
  </div>

  <!-- FULL -->
  <div class="inner full">

    <div class="handle"></div>

    <div class="fullTitle">DXSJ Infinite Radio</div>
    <div class="status" id="status">Ready</div>

    <button id="playBtnFull">▶</button>

  </div>

</div>

<audio id="audio"></audio>

<script>

var sheet = document.getElementById("sheet");
var backdrop = document.getElementById("backdrop");

var playMini = document.getElementById("playBtnMini");
var playFull = document.getElementById("playBtnFull");

var status = document.getElementById("status");
var audio = document.getElementById("audio");

var STREAM = "https://stream-177.surfernetwork.com/yy0d3w86zxhvv?zt=eyJhbGciOiJIUzI1NiJ9.eyJzdHJlYW0iOiJ5eTBkM3c4Nnp4aHZ2IiwiaG9zdCI6InN0cmVhbS0xNzcuc3VyZmVybmV0d29yay5jb20iLCJydHRsIjo1LCJqdGkiOiJUaWJ6cXJsZVJVV2hxRDBiekhfdFVnIiwiaWF0IjoxNzgxNjU1MzUxLCJleHAiOjE3ODE2NTU0MTF9.zY3pxvZUWlJW8V3nuVTnv5TO6viaHn_aec_sAJWqpWM";

var playing = false;

/* PLAY */
function playRadio() {
  audio.src = STREAM;
  audio.load();
  audio.play();
  playing = true;

  playMini.innerHTML = "⏸";
  playFull.innerHTML = "⏸";
  status.innerText = "LIVE";
}

/* STOP */
function stopRadio() {
  audio.pause();
  audio.src = "";
  playing = false;

  playMini.innerHTML = "▶";
  playFull.innerHTML = "▶";
  status.innerText = "OFF AIR";
}

/* BUTTONS */
playMini.onclick = function () {
  playing ? stopRadio() : playRadio();
};

playFull.onclick = function () {
  playing ? stopRadio() : playRadio();
};

/* TAP → EXPAND / COLLAPSE */
sheet.addEventListener("click", function (e) {
  if (!sheet.classList.contains("expanded")) {
    sheet.classList.add("expanded");
    backdrop.style.opacity = 1;
    backdrop.style.pointerEvents = "auto";
  }
});

/* BACKDROP → COLLAPSE */
backdrop.onclick = function () {
  sheet.classList.remove("expanded");
  backdrop.style.opacity = 0;
  backdrop.style.pointerEvents = "none";
};

/* DRAG SUPPORT */
let startY = 0;

sheet.addEventListener("touchstart", function (e) {
  startY = e.touches[0].clientY;
});

sheet.addEventListener("touchend", function (e) {
  let endY = e.changedTouches[0].clientY;

  if (startY - endY > 80) {
    sheet.classList.add("expanded");
    backdrop.style.opacity = 1;
    backdrop.style.pointerEvents = "auto";
  }

  if (endY - startY > 80) {
    sheet.classList.remove("expanded");
    backdrop.style.opacity = 0;
    backdrop.style.pointerEvents = "none";
  }
});

</script>

</body>
</html>
