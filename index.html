<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body { margin:0; background:#1a1a2e; display:flex; 
         justify-content:center; align-items:center; height:100vh; }
  #btn { background:#e94560; color:white; border:none; 
         padding:20px 40px; font-size:22px; border-radius:50px; 
         cursor:pointer; }
  #status { color:white; font-family:sans-serif; 
            font-size:16px; margin-top:20px; text-align:center; }
  .container { text-align:center; }
  iframe { display:none; }
</style>
</head>
<body>
<div class="container">
  <button id="btn" onclick="startRadio()">▶ TAP TO LISTEN</button>
  <div id="status">DXSJ Infinite Radio Surigao</div>
  <iframe id="vdo" allow="autoplay; microphone; camera; speaker"></iframe>
</div>

<script>
function startRadio() {
  document.getElementById('btn').innerText = '🔴 LIVE';
  document.getElementById('btn').style.background = '#2ecc71';
  document.getElementById('status').innerText = 'Connecting...';
  document.getElementById('vdo').src = 
    'https://vdo.ninja/?view=fJbgPNk&autoplay=1&novideo=1&muted=0&nopreview=1&cleanoutput=1';
  setTimeout(function(){
    document.getElementById('status').innerText = '🔴 ON AIR - DXSJ Infinite Radio';
  }, 3000);
}
</script>
</body>
</html>
