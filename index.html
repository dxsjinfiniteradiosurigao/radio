<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>93.3 Infinite Radio - Modern Player</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:Inter,sans-serif;
background:linear-gradient(180deg,#071A4A,#0B2E7A 45%,#f4f7ff);
min-height:100vh;
display:flex;
justify-content:center;
color:#fff;
}
.app{width:100%;max-width:430px;padding:20px}
.hero{text-align:center;padding-top:20px}
.live-pill{
display:inline-flex;gap:8px;align-items:center;
padding:10px 18px;border-radius:30px;
background:rgba(255,255,255,.12);
backdrop-filter:blur(20px);
}
.live-dot{
width:10px;height:10px;border-radius:50%;background:#ff304f;
animation:blink 1s infinite;
}
@keyframes blink{50%{opacity:.3}}
.logo-wrap{position:relative;width:220px;height:220px;margin:25px auto}
.glow{
position:absolute;inset:0;border-radius:50%;
background:radial-gradient(circle,rgba(227,28,61,.6),transparent 70%);
animation:pulse 2.5s infinite;
}
@keyframes pulse{
from{transform:scale(.9);opacity:.7}
to{transform:scale(1.4);opacity:0}
}
.logo{
position:absolute;inset:25px;
background:#fff;border-radius:50%;
display:flex;align-items:center;justify-content:center;
color:#0B2E7A;font-size:80px;
animation:float 4s ease-in-out infinite;
}
@keyframes float{
50%{transform:translateY(-12px)}
}
.equalizer{display:flex;justify-content:center;gap:6px;margin:20px 0}
.equalizer span{
width:6px;background:#ff304f;border-radius:10px;
animation:eq 1s infinite;
}
.equalizer span:nth-child(1){height:20px}
.equalizer span:nth-child(2){height:40px;animation-delay:.2s}
.equalizer span:nth-child(3){height:60px;animation-delay:.4s}
.equalizer span:nth-child(4){height:30px;animation-delay:.6s}
.equalizer span:nth-child(5){height:50px;animation-delay:.8s}
@keyframes eq{50%{transform:scaleY(1.7)}}
.glass{
background:rgba(255,255,255,.12);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,.15);
border-radius:28px;
padding:20px;
margin-top:18px;
}
.play{
width:90px;height:90px;border:none;border-radius:50%;
background:linear-gradient(135deg,#E31C3D,#FF5D73);
color:#fff;font-size:34px;cursor:pointer;
box-shadow:0 10px 40px rgba(227,28,61,.4);
}
.controls{text-align:center}
.range{width:100%;margin-top:15px}
.schedule div{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.1)}
.bottom{
position:sticky;bottom:10px;margin-top:20px;
display:flex;justify-content:space-around;
}
.bottom button{
background:rgba(255,255,255,.12);
border:none;color:#fff;padding:12px;border-radius:18px
}
h1{margin-top:10px}
p{opacity:.85}
</style>
</head>
<body>
<div class="app">
<div class="hero">
<div class="live-pill"><span class="live-dot"></span>LIVE BROADCAST</div>

<div class="logo-wrap">
<div class="glow"></div>
<div class="logo"><i class="ti ti-radio"></i></div>
</div>

<h1>93.3 Infinite Radio</h1>
<p>Surigao City</p>

<div class="equalizer">
<span></span><span></span><span></span><span></span><span></span>
</div>
</div>

<div class="glass controls">
<h3>Live Stream</h3>
<p id="status">OFF AIR</p><br>
<button id="playBtn" class="play"><i class="ti ti-player-play-filled"></i></button>
<input id="vol" class="range" type="range" min="0" max="100" value="80">
</div>

<div class="glass">
<h3>Now Playing</h3>
<p>Infinite News Express</p>
<p>Live from Surigao City Studio</p>
</div>

<div class="glass">
<h3>Weather</h3>
<p>☀️ Surigao City • 31°C</p>
</div>

<div class="glass schedule">
<h3>Today's Programs</h3><br>
<div><span>06:00 AM</span><span>Morning Patrol</span></div>
<div><span>09:00 AM</span><span>Public Service Hour</span></div>
<div><span>12:00 PM</span><span>Infinite News Express</span></div>
<div><span>05:00 PM</span><span>Drive Time Mix</span></div>
</div>

<div class="bottom">
<button><i class="ti ti-radio"></i></button>
<button><i class="ti ti-calendar"></i></button>
<button><i class="ti ti-news"></i></button>
<button><i class="ti ti-info-circle"></i></button>
</div>
</div>

<iframe id="stream" style="display:none"></iframe>

<script>
const STREAM='https://vdo.ninja/?view=fJbgPNk&autoplay=1&novideo=1&muted=0&nopreview=1&cleanoutput=1';
let playing=false;
const btn=document.getElementById('playBtn');
const status=document.getElementById('status');
const frame=document.getElementById('stream');

btn.onclick=()=>{
 if(!playing){
   frame.src=STREAM;
   status.textContent='LIVE';
   btn.innerHTML='<i class="ti ti-player-stop-filled"></i>';
   playing=true;
 }else{
   frame.src='';
   status.textContent='OFF AIR';
   btn.innerHTML='<i class="ti ti-player-play-filled"></i>';
   playing=false;
 }
};
</script>
</body>
</html>
