<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DXSJ Infinite Radio</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0b1b3a">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">

<style>
:root{
  --bg1:#0b1b3a;
  --bg2:#1a3a8f;
  --accent:#dc1e3c;
  --glass: rgba(255,255,255,0.08);
}

*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system;}

body{
  height:100vh;
  overflow:hidden;
  background:linear-gradient(120deg,var(--bg1),var(--bg2));
  color:#fff;
}

/* background glow */
.bg{
  position:fixed;
  inset:0;
  background:radial-gradient(circle at 20% 20%, rgba(220,30,60,0.25), transparent 40%),
             radial-gradient(circle at 80% 80%, rgba(26,58,143,0.4), transparent 40%);
  z-index:-1;
}

/* top info */
.topbar{
  position:absolute;
  top:10px;
  width:100%;
  text-align:center;
  font-size:12px;
  opacity:0.85;
}

/* home */
.home{
  height:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:10px;
}

/* album */
.album{
  width:220px;
  height:220px;
  border-radius:50%;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.2);
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  overflow:hidden;
}

canvas{
  position:absolute;
  width:100%;
  height:100%;
}

/* button */
button{
  width:80px;
  height:80px;
  border-radius:50%;
  border:none;
  background:#dc1e3c;
  color:#fff;
  font-size:26px;
  box-shadow:0 10px 30px rgba(220,30,60,0.4);
}

/* mini player */
.mini{
  position:fixed;
  bottom:60px;
  left:10px;
  right:10px;
  height:65px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(20px);
  border-radius:16px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 12px;
  transform:translateY(120%);
  transition:.3s;
}

.mini.show{transform:translateY(0);}

/* tabs */
.tabs{
  position:fixed;
  bottom:0;
  width:100%;
  height:60px;
  display:flex;
  justify-content:space-around;
  align-items:center;
  background:rgba(0,0,0,0.35);
  backdrop-filter:blur(20px);
}

.tab{
  font-size:11px;
  opacity:0.6;
  text-align:center;
}

.tab.active{opacity:1}

/* pages */
.page{
  height:100%;
  padding:20px;
  overflow:auto;
  display:none;
}
.page.active{display:block;}
</style>
</head>

<body>

<div class="bg"></div>

<!-- TIME -->
<div class="topbar" id="clock">Loading time...</div>

<!-- HOME -->
<div class="page active" id="home">
  <div class="home">

    <div class="album">
      <canvas id="vis"></canvas>
    </div>

    <h2>DXSJ Infinite Radio</h2>
    <button id="play">▶</button>

  </div>
</div>

<!-- LIVE -->
<div class="page" id="live">
  <h3>Livestream ready</h3>
</div>

<!-- SCHEDULE -->
<div class="page" id="schedule">
  <p>Schedule tab content here</p>
</div>

<!-- ABOUT -->
<div class="page" id="about">
  <p>About station info here</p>
</div>

<!-- MINI PLAYER -->
<div class="mini" id="mini">
  <div>Now Playing</div>
  <button id="miniBtn">⏯</button>
</div>

<!-- TABS -->
<div class="tabs">
  <div class="tab active" onclick="nav('home')">Home</div>
  <div class="tab" onclick="nav('live')">Live</div>
  <div class="tab" onclick="nav('schedule')">Schedule</div>
  <div class="tab" onclick="nav('about')">About</div>
</div>

<script>
const STREAM="https://stream-02.surfernetwork.com/yy0d3w86zxhvv?...";

let audio=new Audio();
audio.crossOrigin="anonymous";

let ctx, analyser, source;
let playing=false;

/* CLOCK */
function updateClock(){
  const d=new Date();
  document.getElementById("clock").innerText=
    d.toLocaleDateString()+" • "+d.toLocaleTimeString();
}
setInterval(updateClock,1000);
updateClock();

/* VISUALIZER FIX */
function setup(){
  ctx=new AudioContext();
  analyser=ctx.createAnalyser();
  source=ctx.createMediaElementSource(audio);
  source.connect(analyser);
  analyser.connect(ctx.destination);
  analyser.fftSize=64;
}

function draw(){
  requestAnimationFrame(draw);
  if(!analyser)return;

  const canvas=document.getElementById("vis");
  const c=canvas.getContext("2d");

  canvas.width=220;
  canvas.height=220;

  let data=new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteFrequencyData(data);

  c.clearRect(0,0,220,220);

  let x=10;
  for(let i=0;i<data.length;i++){
    let h=data[i]/2;
    c.fillStyle="#dc1e3c";
    c.fillRect(x,110-h/2,6,h);
    x+=10;
  }
}

/* PLAY */
document.getElementById("play").onclick=async()=>{
  if(!playing){
    audio.src=STREAM;
    await audio.play();

    if(!ctx) setup();
    draw();

    document.getElementById("mini").classList.add("show");
    playing=true;
  }else{
    audio.pause();
    playing=false;
  }
};

/* NAV */
function nav(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}
</script>

</body>
</html>
