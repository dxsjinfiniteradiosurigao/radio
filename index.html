<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DXSJ Radio</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f1f4d;
  height: 200vh; /* allow scroll */
}

/* FAKE CONTENT */
.content {
  padding: 20px;
  color: white;
}

/* PLAYER WRAPPER */
.player {
  position: fixed;
  left: 0;
  right: 0;
  top: 0;
  height: 100vh;
  background: linear-gradient(#1a3a8f, #0f1f4d);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  transition: all 0.35s ease;
  z-index: 9999;
}

/* MINI STATE */
.player.mini {
  height: 70px;
  top: auto;
  bottom: 0;
  flex-direction: row;
  justify-content: space-between;
  padding: 10px 14px;
  border-radius: 18px 18px 0 0;
}

/* TITLE */
.title {
  font-size: 22px;
  color: white;
  font-weight: bold;
  transition: 0.3s;
}

.player.mini .title {
  font-size: 14px;
}

/* STATUS */
.status {
  color: rgba(255,255,255,0.7);
  font-size: 14px;
}

/* BUTTON */
button {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  border: none;
  background: #dc1e3c;
  color: white;
  font-size: 20px;
}

.player.mini button {
  width: 45px;
  height: 45px;
  font-size: 16px;
}

</style>
</head>

<body>

<div class="content">
  <h2>DXSJ Infinite Radio</h2>
  <p>Scroll down to minimize player</p>
  <p>Keep scrolling to see effect</p>
</div>

<!-- PLAYER -->
<div class="player" id="playerBox">

  <div>
    <div class="title">DXSJ Infinite Radio</div>
    <div class="status" id="status">FULL PLAYER</div>
  </div>

  <button id="playBtn">▶</button>

</div>

<audio id="audio"></audio>

<script>

var playerBox = document.getElementById("playerBox");
var status = document.getElementById("status");
var playBtn = document.getElementById("playBtn");

var audio = document.getElementById("audio");

var STREAM = "https://stream-177.surfernetwork.com/yy0d3w86zxhvv?zt=eyJhbGciOiJIUzI1NiJ9.eyJzdHJlYW0iOiJ5eTBkM3c4Nnp4aHZ2IiwiaG9zdCI6InN0cmVhbS0xNzcuc3VyZmVybmV0d29yay5jb20iLCJydHRsIjo1LCJqdGkiOiJUaWJ6cXJsZVJVV2hxRDBiekhfdFVnIiwiaWF0IjoxNzgxNjU1MzUxLCJleHAiOjE3ODE2NTU0MTF9.zY3pxvZUWlJW8V3nuVTnv5TO6viaHn_aec_sAJWqpWM";

var playing = false;

/* PLAY */
playBtn.onclick = async function () {
  if (!playing) {
    audio.src = STREAM;
    audio.load();
    await audio.play();
    playing = true;
    playBtn.innerHTML = "⏸";
  } else {
    audio.pause();
    audio.src = "";
    playing = false;
    playBtn.innerHTML = "▶";
  }
};

/* SCROLL DETECT → MINIMIZE / EXPAND */
window.addEventListener("scroll", function () {

  if (window.scrollY > 80) {
    playerBox.classList.add("mini");
    status.innerText = "MINI PLAYER";
  } else {
    playerBox.classList.remove("mini");
    status.innerText = "FULL PLAYER";
  }

});

</script>

</body>
</html>
