<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DXSJ Infinite Radio</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:#0b1220;
  color:#fff;
  overflow-x:hidden;
}

/* APP */
.app{
  width:100%;
  max-width:430px;
  margin:0 auto;
  min-height:200vh; /* allow scroll demo */
  position:relative;
}

/* =========================
   HERO PLAYER (FULLSCREEN)
========================= */
.hero{
  position:sticky;
  top:0;
  z-index:100;
  height:420px;
  background:linear-gradient(135deg,#0f2a6b,#1a3a8f);
  border-bottom-left-radius:30px;
  border-bottom-right-radius:30px;
  overflow:hidden;
  transition:all .5s ease;
}

/* COLLAPSED STATE (Spotify-like mini player) */
.hero.mini{
  height:78px;
  border-radius:0;
  display:flex;
  align-items:center;
  padding:10px 14px;
}

/* TOP BAR */
.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px;
}

.title{
  font-weight:700;
  font-size:14px;
  letter-spacing:.5px;
}

.icon-btn{
  width:38px;height:38px;
  border-radius:50%;
  border:none;
  background:rgba(255,255,255,.12);
  color:#fff;
}

/* CENTER CONTENT */
.center{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100%;
  transition:.4s;
}

/* hide center when mini */
.hero.mini .center{
  flex-direction:row;
  justify-content:flex-start;
  gap:12px;
  height:auto;
}

/* DISC */
.disc{
  width:160px;
  height:160px;
  border-radius:50%;
  background:#fff;
  border:6px solid #ff2d55;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:.5s;
}

.hero.mini .disc{
  width:48px;
  height:48px;
  border-width:3px;
}

/* pulse */
.ring{
  position:absolute;
  width:160px;height:160px;
  border-radius:50%;
  border:2px solid rgba(255,45,85,.4);
  animation:pulse 2s infinite;
}

@keyframes pulse{
  0%{transform:scale(1);opacity:.7}
  100%{transform:scale(1.6);opacity:0}
}

/* TEXT */
.meta{
  text-align:center;
  margin-top:16px;
  transition:.4s;
}

.hero.mini .meta{
  margin-top:0;
  text-align:left;
}

.meta h1{
  font-size:20px;
}

.hero.mini .meta h1{
  font-size:14px;
}

.meta p{
  font-size:12px;
  opacity:.7;
}

/* =========================
   PLAYER CONTROLS
========================= */
.controls{
  margin-top:18px;
  display:flex;
  gap:18px;
  justify-content:center;
}

.hero.mini .controls{
  margin-left:auto;
}

/* PLAY */
.play{
  width:68px;
  height:68px;
  border-radius:50%;
  border:none;
  background:#ff2d55;
  color:#fff;
  font-size:26px;
  box-shadow:0 10px 30px rgba(255,45,85,.35);
}

/* MINI MODE PLAY */
.hero.mini .play{
  width:44px;height:44px;
  font-size:18px;
}

/* LIKE */
.btn{
  width:48px;height:48px;
  border-radius:50%;
  border:none;
  background:rgba(255,255,255,.12);
  color:#fff;
}

/* =========================
   CONTENT BELOW
========================= */
.content{
  padding:20px;
  color:#222;
}

.card{
  background:#fff;
  border-radius:18px;
  padding:16px;
  margin-bottom:12px;
}

/* sticky mini shadow */
.hero.mini{
  box-shadow:0 10px 30px rgba(0,0,0,.3);
}
</style>
</head>

<body>

<div class="app">

  <!-- HERO PLAYER -->
  <div class="hero" id="hero">

    <div class="top">
      <button class="icon-btn"><i class="ti ti-menu-2"></i></button>
      <div class="title">DXSJ Infinite Radio</div>
      <button class="icon-btn"><i class="ti ti-share"></i></button>
    </div>

    <div class="center">

      <div style="position:relative">
        <div class="ring"></div>
        <div class="disc">
          <i class="ti ti-radio" style="font-size:34px;color:#1a3a8f;"></i>
        </div>
      </div>

      <div class="meta">
        <h1>DXSJ Infinite Radio</h1>
        <p>Surigao City • Live Stream</p>

        <div class="controls">
          <button class="btn"><i class="ti ti-heart"></i></button>
          <button class="play" id="playBtn"><i class="ti ti-player-play"></i></button>
          <button class="btn"><i class="ti ti-volume"></i></button>
        </div>
      </div>

    </div>
  </div>

  <!-- CONTENT -->
  <div class="content">

    <div class="card">
      <b>Now Playing</b><br>
      Smooth Radio Mix
    </div>

    <div class="card">
      Scroll down → player collapses like Spotify
    </div>

    <div class="card" style="height:600px">
      More content...
    </div>

  </div>

</div>

<script>
const hero = document.getElementById("hero");

window.addEventListener("scroll", () => {
  if(window.scrollY > 120){
    hero.classList.add("mini");
  } else {
    hero.classList.remove("mini");
  }
});
</script>

</body>
</html>
