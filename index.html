<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DXSJ Infinite Radio PRO</title>

<meta name="theme-color" content="#0b0f1a">

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0b0f1a;
  color:white;
  overflow:hidden;
}

/* 🎨 Apple Music style animated background */
.bg{
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 20% 20%, #dc1e3c55, transparent 40%),
    radial-gradient(circle at 80% 30%, #1db95455, transparent 40%),
    radial-gradient(circle at 50% 80%, #3b82f655, transparent 40%);
  filter:blur(60px);
  animation:move 12s infinite alternate ease-in-out;
  z-index:-1;
}
@keyframes move{
  0%{transform:scale(1) translate(0,0);}
  100%{transform:scale(1.3) translate(-30px,20px);}
}

/* CENTER UI */
.wrap{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:20px;
}

/* TITLE */
h1{margin:0;font-size:22px;}
p{color:#aaa;font-size:12px;}

/* SPECTRUM */
canvas{
  width:90%;
  max-width:420px;
  height:120px;
  margin:20px 0;
  border-radius:12px;
  background:rgba(255,255,255,0.03);
}

/* BUTTON */
button{
  padding:14px 26px;
  border:none;
  border-radius:999px;
  background:#dc1e3c;
  color:white;
  font-weight:700;
}

/* STATUS */
#status{
  margin-top:10px;
  font-size:12px;
  color:#1db954;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="wrap">
  <h1>DXSJ Infinite Radio</h1>
  <p>Surigao City Live Broadcast</p>

  <canvas id="viz"></canvas>

  <button onclick="togglePlay()">▶ Play / Stop</button>

  <div id="status">Offline</div>
</div>

<audio id="audio" crossorigin="anonymous"></audio>

<script>
/* ================= STREAMS ================= */
const STREAMS=[
  "https://stream-02.surfernetwork.com/yy0d3w86zxhvv",
  "https://stream-177.surfernetwork.com/yy0d3w86zxhvv"
];

let index=0;
let audio=document.getElementById("audio");
let playing=false;

/* ================= AUDIO ENGINE ================= */
let ctx, analyser, source, data;

function initAudio(){
  ctx = new (window.AudioContext||window.webkitAudioContext)();
  analyser = ctx.createAnalyser();
  analyser.fftSize = 128;

  source = ctx.createMediaElementSource(audio);
  source.connect(analyser);
  analyser.connect(ctx.destination);

  data = new Uint8Array(analyser.frequencyBinCount);
}

/* ================= SPECTRUM ANALYZER ================= */
const canvas=document.getElementById("viz");
const c=canvas.getContext("2d");

function draw(){
  requestAnimationFrame(draw);
  if(!analyser) return;

  analyser.getByteFrequencyData(data);

  c.clearRect(0,0,canvas.width,canvas.height);

  let w=canvas.width/data.length;

  for(let i=0;i<data.length;i++){
    let h=data[i];

    c.fillStyle=`rgb(${h+100},40,80)`;
    c.fillRect(i*w, canvas.height-h, w-2, h);

    /* 🎚 HAPTIC BEAT */
    if(h>210 && navigator.vibrate){
      navigator.vibrate(8);
    }
  }
}

/* ================= STREAM FALLBACK ================= */
function playStream(){
  audio.src = STREAMS[index];

  audio.play().catch(()=>{
    index = (index+1)%STREAMS.length;
    playStream();
  });
}

/* ================= MEDIA SESSION ================= */
function setupMedia(){
  if(!('mediaSession' in navigator)) return;

  navigator.mediaSession.metadata = new MediaMetadata({
    title:"DXSJ Infinite Radio",
    artist:"Surigao City",
    album:"Live Broadcast"
  });

  navigator.mediaSession.setActionHandler("play", togglePlay);
  navigator.mediaSession.setActionHandler("pause", togglePlay);
}

/* ================= NOTIFICATIONS ================= */
async function enableNotif(){
  if(!("Notification" in window)) return;
  await Notification.requestPermission();
}

/* ================= NOW PLAYING (API READY) ================= */
async function nowPlaying(){
  try{
    let res = await fetch("nowplaying.json");
    let data = await res.json();
    document.getElementById("status").innerText = "Now Playing: "+data.title;
  }catch(e){}
}

/* ================= PLAY ================= */
function togglePlay(){

  if(!playing){
    if(!ctx) initAudio();
    ctx.resume();

    playStream();
    draw();

    setupMedia();
    enableNotif();

    playing=true;
    document.getElementById("status").innerText="LIVE";
  }
  else{
    audio.pause();
    playing=false;
    document.getElementById("status").innerText="OFFLINE";
  }
}

/* ================= PWA SERVICE WORKER (INLINE) ================= */
if("serviceWorker" in navigator){
  const sw = `
    const CACHE="dxsj-v1";
    self.addEventListener("install",e=>{
      e.waitUntil(caches.open(CACHE).then(c=>c.addAll(["./"])));
    });
    self.addEventListener("fetch",e=>{
      e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request)));
    });
  `;

  const blob=new Blob([sw],{type:"text/javascript"});
  navigator.serviceWorker.register(URL.createObjectURL(blob));
}

/* ================= INIT ================= */
setInterval(nowPlaying,15000);
nowPlaying();

</script>

</body>
</html>
