<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DXSJ Infinite Radio</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #f0f4ff;
  min-height: 100vh;
  display: flex;
  justify-content: center;
}

.app {
  width: 100%;
  max-width: 420px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  background: #f0f4ff;
  position: relative;
}

/* KEEP YOUR UI SAME (trimmed for clarity in this reply) */
/* --- your full CSS remains unchanged --- */

</style>
</head>

<body>

<div class="app">

  <!-- TOP -->
  <div class="top-band">
    <div class="top-row">
      <button class="icon-btn"><i class="ti ti-menu-2"></i></button>
      <span class="top-title">DXSJ Infinite Radio</span>
      <button class="icon-btn" id="shareBtn"><i class="ti ti-share"></i></button>
    </div>

    <div class="album-wrap">
      <div class="album">
        <div class="album-inner">
          <i class="ti ti-radio"></i>
        </div>
      </div>
    </div>
  </div>

  <!-- BODY -->
  <div class="body">

    <div class="card">
      <div class="station-name">DXSJ Infinite Radio</div>
      <div class="station-sub">Surigao City</div>
    </div>

    <!-- CONTROLS -->
    <div class="card">

      <div class="ctrl-row">
        <button class="side-btn" id="heartBtn"><i class="ti ti-heart"></i></button>

        <div class="play-wrap">
          <button class="play-btn off-state" id="playBtn">
            <i class="ti ti-player-play" id="playIcon"></i>
          </button>
        </div>

        <button class="side-btn"><i class="ti ti-moon"></i></button>
      </div>

      <div class="vol-section">
        <input type="range" id="volSlider" min="0" max="100" value="80">
      </div>

    </div>

  </div>

</div>

<!-- ✅ AUDIO MUST BE INSIDE BODY -->
<audio id="player" preload="none"></audio>

<script>

var STREAM = "https://stream-177.surfernetwork.com/yy0d3w86zxhvv?zt=eyJhbGciOiJIUzI1NiJ9.eyJzdHJlYW0iOiJ5eTBkM3c4Nnp4aHZ2IiwiaG9zdCI6InN0cmVhbS0xNzcuc3VyZmVybmV0d29yay5jb20iLCJydHRsIjo1LCJqdGkiOiJUaWJ6cXJsZVJVV2hxRDBiekhfdFVnIiwiaWF0IjoxNzgxNjU1MzUxLCJleHAiOjE3ODE2NTU0MTF9.zY3pxvZUWlJW8V3nuVTnv5TO6viaHn_aec_sAJWqpWM";

var playing = false;

var player = document.getElementById("player");
var playBtn = document.getElementById("playBtn");
var playIcon = document.getElementById("playIcon");

function setLive(){
  playing = true;
  playIcon.className = "ti ti-player-stop";
}

function setOff(){
  playing = false;
  playIcon.className = "ti ti-player-play";
}

playBtn.addEventListener("click", async function () {

  if (!playing) {
    try {
      player.src = STREAM;
      player.load();
      await player.play();
      setLive();
    } catch (e) {
      console.log(e);
      setOff();
    }
  } else {
    player.pause();
    player.src = "";
    setOff();
  }

});

/* AUTO PLAY ON LOAD */
window.addEventListener("load", function () {
  setTimeout(() => {
    playBtn.click();
  }, 1200);
});

</script>

</body>
</html>
