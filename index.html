<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>DXSJ Infinite Radio Premium</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:Inter,Segoe UI,sans-serif;
background:#070b16;
color:#fff;
overflow-x:hidden;
min-height:100vh;
display:flex;
justify-content:center;
}
body:before,body:after{
content:'';position:fixed;inset:auto;
width:500px;height:500px;border-radius:50%;
filter:blur(120px);opacity:.35;z-index:-1;
}
body:before{background:#1a3a8f;top:-150px;left:-150px}
body:after{background:#dc1e3c;bottom:-150px;right:-150px}

.app{width:100%;max-width:430px;min-height:100vh;padding:20px}

.glass{
background:rgba(255,255,255,.08);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,.12);
border-radius:28px;
}

.header{padding:20px;margin-bottom:20px}
.top{display:flex;justify-content:space-between;align-items:center}
.icon{
width:42px;height:42px;border-radius:50%;
border:none;background:rgba(255,255,255,.1);color:#fff;
cursor:pointer;
}

.player{
padding:25px;text-align:center;
}

.disc-wrap{position:relative;width:220px;height:220px;margin:20px auto}
.disc{
width:220px;height:220px;border-radius:50%;
background:linear-gradient(135deg,#dc1e3c,#1a3a8f);
display:flex;align-items:center;justify-content:center;
box-shadow:0 0 40px rgba(220,30,60,.5);
animation:spin 18s linear infinite paused;
}
.playing .disc{animation-play-state:running}

.disc:before{
content:'';width:80px;height:80px;border-radius:50%;
background:#070b16;
}

@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}

.live{
display:inline-flex;
gap:8px;
padding:8px 16px;
border-radius:30px;
background:#dc1e3c;
box-shadow:0 0 20px #dc1e3c;
font-weight:700;
margin-bottom:15px;
}

.station{font-size:28px;font-weight:800}
.city{opacity:.8;margin-top:5px}

.eq{
display:flex;justify-content:center;gap:4px;margin:20px 0;
height:40px;
}
.eq span{
width:6px;background:#dc1e3c;border-radius:10px;
animation:eq 1s infinite;
}
.eq span:nth-child(2){animation-delay:.1s}
.eq span:nth-child(3){animation-delay:.2s}
.eq span:nth-child(4){animation-delay:.3s}
.eq span:nth-child(5){animation-delay:.4s}

@keyframes eq{
0%,100%{height:10px}
50%{height:40px}
}

.controls{
display:flex;justify-content:center;align-items:center;gap:20px;
margin:25px 0;
}

.side,.play{
border:none;cursor:pointer;color:#fff;
}

.side{
width:55px;height:55px;border-radius:50%;
background:rgba(255,255,255,.1);
}

.play{
width:90px;height:90px;border-radius:50%;
background:linear-gradient(135deg,#ff3355,#dc1e3c);
font-size:34px;
box-shadow:0 10px 40px rgba(220,30,60,.5);
}

.volume{margin-top:20px}
input[type=range]{width:100%}

.stats{
margin-top:20px;padding:20px;text-align:center;
}
.listeners{
font-size:42px;font-weight:800;
color:#fff;
}

.nav{
position:sticky;bottom:10px;margin-top:20px;
display:flex;justify-content:space-around;
padding:18px;
}
.nav button{
background:none;border:none;color:#fff;opacity:.7
}

.particles span{
position:fixed;
width:6px;height:6px;
background:rgba(255,255,255,.2);
border-radius:50%;
animation:float 15s linear infinite;
}
@keyframes float{
from{transform:translateY(110vh)}
to{transform:translateY(-10vh)}
}
</style>
</head>
<body>
<div class="particles">
<span style="left:10%;animation-delay:0s"></span>
<span style="left:30%;animation-delay:3s"></span>
<span style="left:50%;animation-delay:6s"></span>
<span style="left:70%;animation-delay:2s"></span>
<span style="left:90%;animation-delay:8s"></span>
</div>

<div class="app">
<div class="glass header">
<div class="top">
<button class="icon"><i class="ti ti-menu-2"></i></button>
<h3>DXSJ Infinite Radio</h3>
<button class="icon"><i class="ti ti-share"></i></button>
</div>
</div>

<div class="glass player" id="player">
<div class="live">● LIVE RADIO</div>

<div class="disc-wrap">
<div class="disc"></div>
</div>

<div class="station">93.3 Infinite Radio</div>
<div class="city">Surigao City</div>

<div class="eq">
<span></span><span></span><span></span><span></span><span></span>
</div>

<div class="controls">
<button class="side"><i class="ti ti-heart"></i></button>
<button class="play" id="playBtn">
<i class="ti ti-player-play" id="icon"></i>
</button>
<button class="side"><i class="ti ti-volume"></i></button>
</div>

<div class="volume">
<input type="range" min="0" max="100" value="80">
</div>
</div>

<div class="glass nav">
<button><i class="ti ti-radio"></i></button>
<button><i class="ti ti-calendar"></i></button>
<button><i class="ti ti-users"></i></button>
<button><i class="ti ti-info-circle"></i></button>
</div>
</div>

<iframe id="stream" style="display:none"></iframe>

<script>
const STREAM='https://vdo.ninja/?view=fJbgPNk&autoplay=1&novideo=1&muted=0&nopreview=1&cleanoutput=1';
const btn=document.getElementById('playBtn');
const icon=document.getElementById('icon');
const frame=document.getElementById('stream');
const player=document.getElementById('player');
let playing=false;

btn.onclick=()=>{
playing=!playing;
if(playing){
frame.src=STREAM;
icon.className='ti ti-player-stop';
player.classList.add('playing');
}else{
frame.src='';
icon.className='ti ti-player-play';
player.classList.remove('playing');
}
}

setInterval(()=>{
const el=document.getElementById('listeners');
let n=parseInt(el.innerText);
n += Math.floor(Math.random()*5)-2;
if(n<2000)n=2000;
el.innerText=n;
},3000);
</script>
</body>
</html>
